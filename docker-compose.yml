version: "3.3"

services:
  traefik:
    image: "traefik:v2.11"
    container_name: "traefik"
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - traefik-net

  whoami:
    image: "traefik/whoami"
    deploy:
      replicas: 3
    networks:
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api-router.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.api-router.entrypoints=web"
      - "traefik.http.routers.api-router.middlewares=api-strip"
      - "traefik.http.middlewares.api-strip.stripprefix.prefixes=/api"
      - "traefik.http.services.api-service.loadbalancer.server.port=80"

  static:
    image: "nginx:alpine"
    networks:
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.static-router.rule=PathPrefix(`/static`)"
      - "traefik.http.routers.static-router.entrypoints=web"
      - "traefik.http.services.static-service.loadbalancer.server.port=80"
      - "traefik.http.routers.static-router.middlewares=static-strip"
      - "traefik.http.middlewares.static-strip.stripprefix.prefixes=/static"
      - "traefik.http.services.static-service.loadbalancer.server.port=80"

networks:
  traefik-net:
    driver: bridge
